<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 40px;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .shield-icon {
            font-size: 40px;
            filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.5));
        }

        h1 {
            margin: 0;
            font-size: 32px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-blue);
            display: block;
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-row:last-child {
            border-bottom: none;
        }

        .setting-info h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
        }

        .setting-info p {
            margin: 0;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Toggle Switch CSS */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="shield-icon">🛡️</div>
            <h1>PhishGuard Dashboard</h1>
        </header>

        <div class="card">
            <h2>Protection Statistics</h2>
            <div class="stat-grid">
                <div class="stat-box">
                    <span class="stat-value" id="total-blocked">...</span>
                    <span class="stat-label">Total Sites Blocked</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value">Active</span>
                    <span class="stat-label">DNR Engine Status</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Security Settings</h2>
            
            <div class="setting-row">
                <div class="setting-info">
                    <h3>Heuristic Scanning</h3>
                    <p>Analyze unknown pages for suspicious patterns (e.g. non-HTTPS password forms).</p>
                </div>
                <label class="switch">
                    <input type="checkbox" checked id="heuristic-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="setting-row">
                <div class="setting-info">
                    <h3>Auto-Update Blocklists</h3>
                    <p>Fetch latest threat definitions every 12 hours.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" checked id="update-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>
    <script src="options.js"></script>
</body>
</html>
