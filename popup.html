<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <div class="shield-icon">🛡️</div>
                <h1>PhishGuard</h1>
            </div>
            <p class="subtitle">Advanced Threat Protection</p>
        </header>
        
        <main>
            <div class="status-card safe" id="status-card">
                <h2 id="status-text">Scanning...</h2>
                <p id="status-url" class="truncate">Checking current tab</p>
            </div>
            
            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-value" id="blocked-count">0</span>
                    <span class="stat-label">Threats Blocked</span>
                </div>
            </div>

            <div class="action-buttons">
                <button id="report" class="btn primary-btn">Report Phishing Site</button>
                <button id="settings" class="btn secondary-btn">Dashboard & Settings</button>
            </div>
        </main>
    </div>
    <script src="popup.js"></script>
</body>
</html>
